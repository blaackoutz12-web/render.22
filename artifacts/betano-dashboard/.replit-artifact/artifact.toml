kind = "web"
previewPath = "/"
title = "Betano Pro Dashboard"
version = "1.0.0"
id = "artifacts/betano-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18190
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/betano-dashboard run dev"

[services.env]
PORT = "18190"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/betano-dashboard", "run", "build"]
publicDir = "artifacts/betano-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
